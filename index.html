<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darija & Vladimir</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <canvas id="flower-canvas"></canvas>
    <div class="envelope-overlay" id="envelopeOverlay">
        <div class="envelope" id="envelope">
            <img src="assets/images/envelope-top.png" class="envelope-top" alt="Envelope flap">
            <img src="assets/images/envelope-bottom.png" class="envelope-bottom" alt="Envelope bottom">
        </div>
    </div>

    <section class="hero">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="assets/videos/backgroundFlowers.mp4" type="video/mp4">
        </video>
        <h1 class="fade-in">
            <span class="imeDarija">Darija</span> &
            <span class="imeVladimir">Vladimir</span>
        </h1>

        <p class="subtitle fade-in delay-1" style="font-family: 'catchy-mager', serif;">
            Pozivamo Vas na naše vjenčanje
        </p>
        <div class="scroll-indicator" id="scrollIndicator">
            <span></span>
        </div>
    </section>

    <section class="date-section">

        <!-- DESKTOP IMAGES -->
        <div class="date-images">

            <div class="img img1"></div>
            <div class="img img2"></div>
        </div>

        <!-- CONTENT -->
        <div class="date">
            <p class="datum">20. jun 2026.</p>

            <div class="countdown" id="countdown">
                <div class="time-box">
                    <span class="num" id="months">00</span>
                    <span class="label">mjeseci</span>
                </div>
                <div class="time-box">
                    <span class="num" id="days">00</span>
                    <span class="label">dana</span>
                </div>
                <div class="time-box">
                    <span class="num" id="hours">00</span>
                    <span class="label">sati</span>
                </div>
            </div>
        </div>

    </section>

    <section class="details map">

        <h1><img src="assets/images/line.png" class="linija">Detalji<img src="assets/images/line.png" class="linija2">
        </h1>

        <div class="infoBox reveal delay-1">
            <span class="label2">Vrijeme</span>
            <p><b>16:00</b></p>
        </div>

        <div class="infoBox reveal delay-2">
            <span class="label2">Lokacija</span>
            <p><b>Restoran Adriatica<br>Kamenari, Crna Gora</b></p><br>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2943.473980573349!2d18.67325907593649!3d42.46020697118369!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x134c3124b8d52f31%3A0x3023c907c65ffa5e!2sAdriatica%20Restaurant!5e0!3m2!1sen!2s!4v1773755504300!5m2!1sen!2s"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>


    </section>



    <section class="pozdrav">
        <h2>Darija & Vladimir</h2>
        <p>Radujemo se Vašem dolasku!</p>
    </section>



    <script type="importmap">
    {
        "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="script.js"></script>

    <audio id="bg-music" loop>
        <source src="assets/music/atLast.mp3" type="audio/mpeg">
    </audio>
</body>

</html>
