<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pozivnica</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="envelope-overlay" id="envelopeOverlay">
        <div class="envelope" id="envelope">
            <img src="assets/images/envelope-top.png" class="envelope-top" alt="Envelope flap">
            <img src="assets/images/envelope-bottom.png" class="envelope-bottom" alt="Envelope bottom">
        </div>
    </div>

    <section class="hero">
        <h1 class="fade-in">
            <span class="imeDarija">Darija</span> &
            <span class="imeVladimir">Vladimir</span>
        </h1>

        <p class="subtitle fade-in delay-1">
            Pozivamo Vas na naše vjenčanje
        </p>
    </section>

    <section class="date-section">
        <div class="date">
            <div class="back"></div>
            <div class="letter-container">
                <div class="letter">
                    <p>21. Jun 2026</p>
                </div>
            </div>
            <div class="flap"></div>
        </div>
    </section>

    <section class="details reveal">
        <h2>Detalji</h2>
        <p>Lokacija: Restoran Adriatica, Kamenari, Crna Gora</p>
        <p>Vrijeme: 16:00</p>
    </section>

    <section class="map">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2943.473980573349!2d18.67325907593649!3d42.46020697118369!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x134c3124b8d52f31%3A0x3023c907c65ffa5e!2sAdriatica%20Restaurant!5e0!3m2!1sen!2s!4v1773755504300!5m2!1sen!2s"
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>

    <script src="script.js"></script>
</body>

</html>
